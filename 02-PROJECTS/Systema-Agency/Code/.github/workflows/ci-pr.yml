name: CI PR

on:
  pull_request:
    branches:
      - main
    paths:
      - "02-PROJECTS/Systema-Agency/**"
      - "02-PROJECTS/Systema-Agency/Code/.github/workflows/ci-pr.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: check-test-build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 02-PROJECTS/Systema-Agency/Code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: 02-PROJECTS/Systema-Agency/Code/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build
